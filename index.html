<html>

<head>
    <title>Hamburger Clicker</title>
    <style>
        #veggieBomb,
        #hamburger,
        #hamburger2,
        #hamburger3,
        #hamburger4,
        #hamburger5,
        #hamburger6,
        #hamburger7,
        #asparagus,
        #asparagus2,
        #veggieBomb2,
        #asparagus3,
        #veggieBomb3 {
            position: fixed;
            z-index: 20;
        }

        #score {
            position: absolute;

        }

        #highscore {
            position: absolute;
            top: 40px;
            left: 16px;

        }

        #speed {
            position: absolute;
            top: 18px;
            left: 16px;
            z-index: 40;
            font-size: 125%;
            font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif
        }

        #keys {
            position: absolute;
            top: 18px;
            left: 16px;
            z-index: 40;
            font-size: 125%;
            font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif
        }

        #win {
            position: absolute;

            left: 16px;
            z-index: 40;
            font-size: 125%;
            color: red;
            font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif
        }

        #btn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            -ms-transform: translate(-50%, -50%);
            background-color: #555;
            color: white;
            font-size: 16px;
            padding: 12px 24px;
            border-radius: 5px;
            z-index: 10;
        }

        #btn2 {
            position: absolute;
            top: 57%;
            left: 50%;
            transform: translate(-50%, -50%);
            -ms-transform: translate(-50%, -50%);
            background-color: #555;
            color: white;
            font-size: 16px;
            padding: 12px 24px;
            border-radius: 5px;
            z-index: 10;
        }

        #Directions {
            position: absolute;
            z-index: 10;
            top: 57%;
            left: 50%;
            transform: translate(-50%, -50%);
            -ms-transform: translate(-50%, -50%);
            font-size: 16px;
            padding: 12px 24px;
            border-radius: 5px;
            font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif
        }

        #Back2 {
            position: absolute;
            top: 0px;
            left: 0px;
            max-width: 100%;
            height: auto;
            z-index: 30;

        }

        #Back {
            position: absolute;
            top: 0px;
            left: 0px;
            max-width: 100%;
            height: auto;
            z-index: 5;
        }

        #Back3 {
            position: absolute;
            top: 0px;
            left: 0px;
            max-width: 100%;
            height: auto;
            z-index: 10;
        }

    <script type="text/javascript" src="game.js">

    </script>
    
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7316616335777051"

<body onload="hideAll()">
    <button id="btn" onClick="Init()">START</button>
    <button id="btn2" onClick="revealDirections()">Directions</button>
    <p id="Directions">Your goal is to click the burgers. Clicking a burger gives you one point. If you miss you lose a
        point. You do not want to click on the bombs. If you do you lose. HAVE FUN!!</p>
    <p id="win"></p>
    <p id="score"></p>
    <p id="highscore"></p>
    <p id="speed"></p>
    <p id="keys">You can either click the buttons or you can click the space bar to start and the shift key for more instructions.</p>

    <img id="veggieBomb" src="projectImages/veggie.png" onClick="lose()" style=" width: 100; height: 100;" />
    <img id="veggieBomb2" src="projectImages/veggie.png" onClick="lose()" style=" width: 100; height: 100;" />

    <img id="Back2" src="projectImages/Background.png" onClick="BackGround()" style=" width:1430; height: 800;" />
    <img id="Back3" src="projectImages/Background.png" onClick="BackGround()" style=" width:1430; height: 800;" />

    <img id="asparagus2" src="projectImages/asparagus.png" onClick="lose()" style="width:100; height:100;" />
    <img id="asparagus3" src="projectImages/asparagus.png" onClick="lose()" style="width:100; height:100;" />
